<!DOCTYPE html>
<html>
<head>
    <title>Testar Webhook</title>
</head>
<body>
    <h1>Testar Webhook n8n</h1>
    <button onclick="testarWebhook()">Clique para testar webhook</button>
    <div id="resultado"></div>

    <script>
        async function testarWebhook() {
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = 'Testando...';
            
            try {
                const response = await fetch("https://primary-jzx9-production.up.railway.app/webhook/64d8e09c-03a0-4d2c-8ada-141e0e26aac3", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: "5511915605439",
                        code: "123456",
                        action: "send_verification"
                    })
                });
                
                const text = await response.text();
                
                resultado.innerHTML = `
                    <h3>Resultado:</h3>
                    <p><strong>Status:</strong> ${response.status}</p>
                    <p><strong>Resposta:</strong> ${text}</p>
                    <p><strong>OK:</strong> ${response.ok ? 'SIM' : 'NÃO'}</p>
                `;
                
            } catch (error) {
                resultado.innerHTML = `
                    <h3>Erro:</h3>
                    <p>${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
