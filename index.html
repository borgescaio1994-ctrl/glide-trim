<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookNow</title>
    <meta name="description" content="Aplicativo para agendamento online" />
    <meta name="author" content="BookNow" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0c1929" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BookNow" />
    <link rel="icon" href="/booknow-mark.png" type="image/png" sizes="any" />
    <link rel="apple-touch-icon" href="/booknow-mark.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph / pré-visualização de link (use URL absoluta do seu domínio em produção) -->
    <meta property="og:title" content="BookNow" />
    <meta property="og:description" content="Agendamento online — clientes, profissionais e lojas" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/booknow-mark.png" />
    <meta property="og:image:alt" content="BookNow — agendamentos" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@BookNow" />
    <meta name="twitter:image" content="/booknow-mark.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
