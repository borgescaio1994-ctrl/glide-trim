# BookNow — Apache 2.4 + Let's Encrypt + SPA (React/Vite)
# Salvar em: /etc/apache2/sites-available/booknow-ssl.conf
#
# Depois:
#   sudo a2enmod ssl rewrite
#   sudo a2ensite booknow-ssl
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Confira o nome da pasta do cert: sudo ls /etc/letsencrypt/live/
# Se não for booknow-wildcard, ajuste SSLCertificateFile / SSLCertificateKeyFile abaixo.

# --- HTTP → HTTPS ---
<VirtualHost *:80>
    ServerName booknow01.duckdns.org
    ServerAlias barbearia-stoffels.duckdns.org

    DocumentRoot /var/www/html

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# --- HTTPS ---
<VirtualHost *:443>
    ServerName booknow01.duckdns.org
    ServerAlias barbearia-stoffels.duckdns.org

    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/booknow-wildcard/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/booknow-wildcard/privkey.pem

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    FallbackResource /index.html
</VirtualHost>
