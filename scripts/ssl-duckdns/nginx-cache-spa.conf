# Incluir no bloco server { } HTTPS do BookNow (synapses / domínios próprios).
# Evita que CDN/proxy guarde index.html antigo (o JS já tem hash no nome do ficheiro).

location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
}

location = /deploy.json {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    default_type application/json;
}

# Service Worker deve atualizar a cada deploy (query ?v= vem do main.tsx)
location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    default_type application/javascript;
}
