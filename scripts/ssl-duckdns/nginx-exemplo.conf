# Exemplo de configuração Nginx para BookNow com HTTPS DuckDNS
# Copie o conteúdo relevante para /etc/nginx/sites-available/default
# ou crie um novo site e ative com: sudo ln -s .../site.conf /etc/nginx/sites-enabled/

# Redirecionar HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Validação Let's Encrypt (Certbot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        allow all;
    }

    # Redirecionar todo o resto para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;   # Aceita qualquer hostname (todos os domínios DuckDNS)

    ssl_certificate     /etc/letsencrypt/live/booknow-wildcard/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/booknow-wildcard/privkey.pem;

    root /var/www/html;
    index index.html;
    try_files $uri $uri/ /index.html;

    # Validação Let's Encrypt (renovação)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        allow all;
    }

    # Headers para SPA
    location / {
        add_header Cache-Control "no-cache";
    }
}
